spring.application.name=course-scheduler
server.port=${PORT:8080}
server.forward-headers-strategy=native

app.api.allowed-origins=${API_ALLOWED_ORIGINS:http://localhost:5173}
app.api.rate-limit-capacity=${API_RATE_LIMIT_CAPACITY:6}
app.api.rate-limit-refill-tokens=${API_RATE_LIMIT_REFILL_TOKENS:6}
app.api.rate-limit-refill-period=${API_RATE_LIMIT_REFILL_PERIOD:PT1M}
app.api.max-concurrent-solves=${API_MAX_CONCURRENT_SOLVES:2}
app.api.client-cache-maximum-size=${API_CLIENT_CACHE_MAXIMUM_SIZE:10000}
app.api.client-cache-expiry=${API_CLIENT_CACHE_EXPIRY:PT30M}
